default_python: "3.11"
editable_installs:
  - ~/Dropbox/Projects/KBUtilLib
  - ~/Dropbox/Projects/cobrakbase
  - ~/Dropbox/Projects/ModelSEEDpy
# ModelSEEDDatabase is a data repo (no pyproject.toml/setup.py); not pip-installable.
